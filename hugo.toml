baseURL = 'https://me9uru.github.io/'
locale = 'zh-cn'
title = "Me9uru's Blog"
theme = 'hugo-theme-stack'
paginate = 10

[params]
  author = 'Me9uru'
  description = '分享技术、思考与生活'

[params.sidebar]
  avatar = ""
  compact = false

[params.footer]
  since = 2026
  customText = ""

[params.article]
  math = false
  toc = true
  readingTime = true

[params.article.list]
  showTags = true

[params.colorScheme]
  toggle = true
  default = "auto"

[params.comments]
  enabled = false

[taxonomies]
  tag = 'tags'
  category = 'categories'

[outputs]
  home = ['HTML', 'RSS']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = false
    style = 'monokai'

[menus]
  [[menus.main]]
    name = '文章'
    url = '/post/'
    weight = 10
  [[menus.main]]
    name = '标签'
    url = '/tags/'
    weight = 20
  [[menus.main]]
    name = '分类'
    url = '/categories/'
    weight = 30
  [[menus.main]]
    name = '关于'
    url = '/about/'
    weight = 40
